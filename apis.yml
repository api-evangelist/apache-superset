aid: apache-superset
name: Apache Superset
description: >-
  Apache Superset is a modern data exploration and visualization platform designed to be visual, intuitive, and
  interactive. It provides a rich set of data visualizations, a no-code chart builder, and a SQL editor with support for
  most SQL-speaking databases. Superset exposes a comprehensive REST API for programmatic access to dashboards, charts,
  datasets, databases, and user management. It is an Apache Software Foundation top-level project.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Analytics
  - BI
  - Dashboard
  - Data Visualization
  - SQL
  - Open Source
created: '2026-03-16'
modified: '2026-05-19'
url: https://raw.githubusercontent.com/api-evangelist/apache-superset/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-superset:apache-superset-rest-api
    name: Apache Superset REST API
    description: >-
      The Superset REST API v1 provides programmatic access to all Superset resources including dashboards (28
      endpoints), charts (20 endpoints), datasets (19 endpoints), databases (30 endpoints), SQL Lab queries (7
      endpoints), saved queries (17 endpoints), tags, annotation layers, CSS templates, themes, row-level security, and
      user management. Authentication uses JWT Bearer tokens obtained via POST /api/v1/security/login.
    humanURL: https://superset.apache.org/developer-docs/api
    tags:
      - REST
      - Dashboards
      - Charts
      - Datasets
      - SQL
      - Analytics
    properties:
      - type: Documentation
        url: https://superset.apache.org/developer-docs/api
      - type: APIReference
        url: https://superset.apache.org/docs/api
      - url: openapi/apache-superset-openapi.yml
        type: OpenAPI
common:
  - type: GitHubRepository
    url: https://github.com/apache/superset
